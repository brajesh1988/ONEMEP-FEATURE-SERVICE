# ── Prod profile — all secrets from environment variables, no defaults ─────────
# Do NOT hardcode any credentials here. Every sensitive value must come from
# the container's environment (Docker secrets, Kubernetes ConfigMap/Secret, etc.).

spring:
  datasource:
    url: ${DB_URL}           # required — no default; startup fails if missing
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.netlink: INFO
    org.springframework.security: WARN
  pattern:
    console: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: when-authorized

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

jwt:
  public-key: ${JWT_PUBLIC_KEY}
