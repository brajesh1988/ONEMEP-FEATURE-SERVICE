# ── Dev profile — local developer machine defaults ─────────────────────────────
# Safe to commit: no real secrets, just convenience defaults for local dev.
# Override any value by setting the corresponding environment variable.

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://16.192.90.23:5432/onemepdev}
    username: ${DB_USERNAME:onemepdev_user}
    password: ${DB_PASSWORD:OneMep@1234}

  jpa:
    show-sql: false


logging:
  level:
    root: WARN
    com.netlink: INFO
    org.springframework.security: WARN

springdoc:
  swagger-ui:
    enabled: true            # show Swagger UI directly on dev (no Gateway needed)
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,metrics,loggers
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
